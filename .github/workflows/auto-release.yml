name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - "mhcseqs/version.py"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: pip install -e ".[dev]"

    - name: Lint
      run: |
        ruff check mhcseqs/ tests/
        ruff format --check mhcseqs/ tests/

    - name: Test
      run: pytest tests/ -v

  release:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install
      run: pip install -e .

    - name: Extract version
      id: version
      run: |
        VERSION=$(python -c "exec(open('mhcseqs/version.py').read()); print(__version__)")
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

    - name: Check if release already exists
      id: check
      run: |
        if gh release view "v${{ steps.version.outputs.version }}" &>/dev/null; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create release
      if: steps.check.outputs.exists == 'false'
      run: |
        gh release create "${{ steps.version.outputs.tag }}" \
          --title "${{ steps.version.outputs.tag }}" \
          --generate-notes
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Build CSVs
      if: steps.check.outputs.exists == 'false'
      run: mhcseqs build --output-dir dist-csv/

    - name: Attach artifacts
      if: steps.check.outputs.exists == 'false'
      run: |
        gh release upload "${{ steps.version.outputs.tag }}" \
          dist-csv/mhc-seqs-raw.csv \
          dist-csv/mhc-full-seqs.csv \
          dist-csv/mhc-merge-report.txt \
          dist-csv/mhc-validation-report.txt
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
