name: Build & Report Counts

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-report:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install dependencies
      run: pip install -e ".[dev]"

    - name: Run tests
      run: pytest tests/ -q

    - name: Build dataset
      run: mhcseqs build

    - name: Report counts
      run: python scripts/report_counts.py
